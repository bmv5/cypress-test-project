name: Cypress Tests

on:
  push:
    branches:
      - setup-cypress  # Викликається при push на гілку setup-cypress, вона в мене типу головна
  pull_request:
    branches:
      - setup-cypress  # Викликається при push на гілку setup-cypress, вона в мене типу головна

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install
          
      - name: Run Cypress tests
        run: |
          npx cypress run
       
